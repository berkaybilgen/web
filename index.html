<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f6f4" />
  <title>Elif &amp; Berkay — 16.08.2026</title>

  <meta property="og:title" content="Elif &amp; Berkay" />
  <meta property="og:description" content="16.08.2026 — Düğünümüze davetlisiniz." />
  <meta property="og:image" content="assets/bg.png" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Tekrar eden ikonlar: tek yerde tanımlanıp <use> ile çağrılır -->
  <svg class="sprite" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="i-calendar" viewBox="0 0 24 24">
        <rect x="3" y="5" width="18" height="16" rx="2" />
        <path d="M3 10h18M8 3v4M16 3v4" />
      </symbol>
      <symbol id="i-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9" />
        <path d="M12 7v5.2l3.4 2" />
      </symbol>
      <symbol id="i-pin" viewBox="0 0 24 24">
        <path d="M12 21.5s7-6.1 7-11.2A7 7 0 0 0 5 10.3c0 5.1 7 11.2 7 11.2Z" />
        <circle cx="12" cy="10" r="2.6" />
      </symbol>
      <symbol id="i-arrow" viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6" />
      </symbol>
      <symbol id="i-chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" />
      </symbol>
    </defs>
  </svg>

  <main>
    <!-- ================= 1. Ekran ================= -->
    <section class="section hero" id="kapak">
      <img class="hero__img" src="assets/bg.png" alt="Gelin ve damat çizimi" />

      <div class="hero__content">
        <h1 class="names">
          <span class="names__first">Elif</span>
          <span class="names__amp">&amp;</span>
          <span class="names__second">Berkay</span>
        </h1>

        <div class="rule" aria-hidden="true">
          <span class="rule__line"></span>
          <span class="rule__dot"></span>
          <span class="rule__line"></span>
        </div>

        <p class="date"><time datetime="2026-08-16">16.08.2026</time></p>
      </div>

      <a class="scroll-cue" href="#detaylar" aria-label="Detaylara git">
        <span class="scroll-cue__text">Detaylar</span>
        <svg class="icon scroll-cue__icon" aria-hidden="true"><use href="#i-chevron" /></svg>
      </a>
    </section>

    <!-- ================= 2. Ekran ================= -->
    <section class="section details" id="detaylar">
      <div class="details__top reveal">
        <p class="details__label">Düğün Töreni</p>

        <time class="datecard" datetime="2026-08-16T19:30">
          <span class="datecard__rule datecard__rule--top" aria-hidden="true"></span>
          <span class="datecard__month">Ağustos 2026</span>
          <span class="datecard__day">16</span>
          <span class="datecard__rule datecard__rule--bottom" aria-hidden="true"></span>
          <span class="datecard__time">
            <svg class="icon" aria-hidden="true"><use href="#i-clock" /></svg>
            Pazar · 19:30
          </span>
        </time>
      </div>

      <div class="ornament reveal" aria-hidden="true">
        <span class="ornament__line"></span>
        <span class="ornament__mark">E &amp; B</span>
        <span class="ornament__line"></span>
      </div>

      <div class="details__bottom reveal">
        <p class="venue">
          <svg class="icon" aria-hidden="true"><use href="#i-pin" /></svg>
          Carmen Wedding House
        </p>

        <div class="map-frame">
          <iframe
            src="https://www.google.com/maps?q=Carmen+Wedding+House&amp;z=16&amp;output=embed"
            title="Carmen Wedding House konumu"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>

        <a
          class="maps-link"
          href="https://www.google.com/maps/search/?api=1&amp;query=Carmen%20Wedding%20House"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span>Yol tarifi al</span>
          <svg class="icon" aria-hidden="true"><use href="#i-arrow" /></svg>
        </a>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
